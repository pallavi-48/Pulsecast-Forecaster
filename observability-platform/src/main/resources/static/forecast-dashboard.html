<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forecast Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .controls {
      margin-bottom: 30px;
      text-align: center;
    }

    select {
      padding: 8px;
      margin: 10px;
      font-size: 14px;
    }

    .chart-container {

      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .chart-box {

      width: 45%;
      min-width: 500px;
    }

    canvas {

      width: 100%;
      height: 400px;
    }

  </style>

</head>

<body>

<h1>SARIMA Forecast Dashboard</h1>

<div class="controls">

  <label>Metric:</label>

  <select id="metric">

    <option value="traffic">Traffic</option>
    <option value="latency">Latency</option>
    <option value="errors">Errors</option>
    <option value="saturation">Saturation</option>

  </select>

  <label>View:</label>

  <select id="view">

    <option value="daily">Daily</option>
    <option value="weekly">Weekly</option>
    <option value="monthly">Monthly</option>
    <option value="twomonth">2 Months</option>

  </select>

</div>


<div class="chart-container">

  <div class="chart-box">

    <h3>Actual vs Forecast</h3>

    <canvas id="comparisonChart"></canvas>

  </div>


  <div class="chart-box">

    <h3>Training Dataset</h3>

    <canvas id="trainingChart"></canvas>

  </div>

</div>


<script>

  let comparisonChart;

  let trainingChart;


  async function loadCharts() {

    const metric =
            document.getElementById("metric").value;

    const view =
            document.getElementById("view").value;


    const comparisonResponse =
            await fetch(
                    `/forecast/chart/compare?metric=${metric}&view=${view}`
            );

    const comparisonData =
            await comparisonResponse.json();


    const trainingResponse =
            await fetch(
                    `/forecast/chart/training?metric=${metric}&view=${view}`
            );

    const trainingData =
            await trainingResponse.json();


    drawComparisonChart(
            comparisonData
    );

    drawTrainingChart(
            trainingData
    );
  }


  function drawComparisonChart(data) {

    const ctx =
            document.getElementById(
                    "comparisonChart"
            );

    if (comparisonChart) {

      comparisonChart.destroy();
    }

    comparisonChart =
            new Chart(ctx, {

              type: 'line',

              data: {

                labels:
                data.timestamps,

                datasets: [

                  {

                    label: 'Actual',

                    data:
                    data.series1,

                    borderWidth: 2
                  },

                  {

                    label: 'Forecast',

                    data:
                    data.series2,

                    borderWidth: 2,

                    borderDash: [5, 5]
                  }
                ]
              },

              options: {

                responsive: true,

                plugins: {

                  title: {

                    display: true,

                    text:
                            'Actual vs Forecast'
                  }
                }
              }
            });
  }


  function drawTrainingChart(data) {

    const ctx =
            document.getElementById(
                    "trainingChart"
            );

    if (trainingChart) {

      trainingChart.destroy();
    }

    trainingChart =
            new Chart(ctx, {

              type: 'line',

              data: {

                labels:
                data.timestamps,

                datasets: [

                  {

                    label: 'Training Data',

                    data:
                    data.series1,

                    borderWidth: 2
                  }
                ]
              },

              options: {

                responsive: true,

                plugins: {

                  title: {

                    display: true,

                    text:
                            'Historical Training Dataset'
                  }
                }
              }
            });
  }


  document.getElementById(
          "metric"
  ).addEventListener(
          "change",
          loadCharts
  );


  document.getElementById(
          "view"
  ).addEventListener(
          "change",
          loadCharts
  );


  loadCharts();

</script>

</body>
</html>
